name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: magic-code-linux-x86_64
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            name: magic-code-linux-aarch64
            cross: true
          - target: x86_64-apple-darwin
            os: macos-latest
            name: magic-code-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            name: magic-code-macos-aarch64
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        working-directory: mc
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build
        env:
          OPENSSL_STATIC: "1"
        run: |
          if [ "${{ matrix.cross }}" = "true" ]; then
            cross build --release --target ${{ matrix.target }}
          else
            cargo build --release --target ${{ matrix.target }}
          fi

      - name: Strip binary
        run: |
          BIN=target/${{ matrix.target }}/release/magic-code
          if command -v strip &>/dev/null; then
            strip "$BIN" 2>/dev/null || true
          fi

      - name: Package
        run: |
          BIN=target/${{ matrix.target }}/release/magic-code
          tar czf ../${{ matrix.name }}.tar.gz -C target/${{ matrix.target }}/release magic-code

      - uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}.tar.gz

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create checksums
        run: |
          cd artifacts
          for dir in */; do
            mv "$dir"/*.tar.gz . 2>/dev/null || true
          done
          sha256sum *.tar.gz > checksums.txt
          cat checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            artifacts/*.tar.gz
            artifacts/checksums.txt
