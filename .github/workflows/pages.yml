name: Pages

on:
  push:
    branches: [main]
    paths: ["README.md", "mc/docs/**", "CHANGELOG.md", "RELEASE_NOTES.md", ".github/workflows/pages.yml", "docs/**"]

permissions:
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Copy site
        run: cp -r docs/site _site
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
